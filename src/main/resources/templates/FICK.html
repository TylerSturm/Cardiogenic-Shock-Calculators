<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FICK Calculator</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<div class="page-shell">
    <div class="card">
        <p class="brand">FICK Calculator</p>

        <div class="field">
            <label for="PAs"></label>
            <input type="text" id="PAs" name="PAs" required />
        </div>

        <div class="field">
            <label for="PAs2"></label>
            <input type="text" id="PAs2" name="PAs2" required />
        </div>

        <div class="field">
            <label for="PAs3"></label>
            <input type="text" id="PAs3" name="PAs3" required />
        </div>

        <div class="field">
            <label for="PAs4"></label>
            <input type="text" id="PAs4" name="PAs4" required />
        </div>

        <div class="field">
            <label for="PAs5"></label>
            <input type="text" id="PAs5" name="PAs5" required />
        </div>

        <div class="field">
            <label for="PAs6"></label>
            <input type="text" id="PAs6" name="PAs6" required />
        </div>
    </div>
</div>
</body>
</html>
